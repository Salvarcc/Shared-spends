<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#233144",
                        "tertiary-container": "#e02928",
                        "on-primary-fixed": "#00201d",
                        "on-secondary-fixed-variant": "#005320",
                        "on-primary-container": "#f4fffc",
                        "on-background": "#0d1c2e",
                        "background": "#f8f9ff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#3d4947",
                        "tertiary": "#bb0112",
                        "primary-fixed": "#89f5e7",
                        "tertiary-fixed": "#ffdad6",
                        "on-error": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "primary-fixed-dim": "#6bd8cb",
                        "on-tertiary-fixed": "#410002",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#002109",
                        "on-tertiary-container": "#fffbff",
                        "on-secondary-container": "#007230",
                        "inverse-primary": "#6bd8cb",
                        "surface-tint": "#006a61",
                        "tertiary-fixed-dim": "#ffb4ab",
                        "surface-container-low": "#eff4ff",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "outline": "#6d7a77",
                        "on-primary-fixed-variant": "#005049",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container": "#e6eeff",
                        "primary-container": "#008378",
                        "outline-variant": "#bcc9c6",
                        "surface-container-highest": "#d5e3fc",
                        "error": "#ba1a1a",
                        "surface": "#f8f9ff",
                        "secondary": "#006e2d",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#93000b",
                        "primary": "#00685f",
                        "secondary-container": "#7cf994",
                        "surface-bright": "#f8f9ff",
                        "on-surface": "#0d1c2e",
                        "secondary-fixed": "#7ffc97",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#62df7d",
                        "surface-dim": "#ccdbf3",
                        "surface-variant": "#d5e3fc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "container-max-width": "800px",
                        "unit": "8px",
                        "gutter": "24px",
                        "card-padding": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "h3": ["Inter"],
                        "label-sm": ["Inter"],
                        "h1": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "h3": ["20px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "1", "fontWeight": "600" }],
                        "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            color: #0d1c2e;
        }

        .card-shadow {
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-surface text-on-surface">
    <!-- TopAppBar -->
    <header class="bg-surface shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center w-full px-gutter max-w-container-max-width mx-auto h-16">
            <div class="flex flex-col">
                <span class="font-h2 text-h2 text-on-background">💸 Agenda de Gastos</span>
                <span class="font-label-sm text-label-sm text-primary">Grupo: Viaje 2024</span>
            </div>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md"
                    href="#">Dashboard</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md"
                    href="#">Gastos</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md"
                    href="#">Balances</a>
                <a class="text-primary border-b-2 border-primary font-semibold pb-1 font-body-md text-body-md"
                    href="#">Grupos</a>
            </nav>
            <button
                class="bg-primary text-on-primary px-4 py-2 rounded-lg font-label-md text-label-md cursor-pointer active:scale-95 transition-transform">
                Nuevo Grupo
            </button>
        </div>
    </header>
    <main class="max-w-container-max-width mx-auto px-gutter py-section-gap space-y-section-gap">
        <!-- Section: Nuevo Grupo -->
        <section>
            <div class="flex items-center gap-2 mb-4">
                <span class="text-2xl">📋</span>
                <h2 class="font-h2 text-h2 text-on-surface">Nuevo Grupo</h2>
            </div>
            <div
                class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow border border-outline-variant/30">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-grow">
                        <label class="block font-label-md text-label-md text-outline mb-2">Nombre del Grupo</label>
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md"
                            placeholder="Ej. Escapada a la Montaña" type="text" />
                    </div>
                    <div class="flex items-end">
                        <button
                            class="w-full md:w-auto bg-primary text-on-primary px-6 py-3 rounded-lg font-label-md text-label-md hover:opacity-90 transition-opacity">
                            Crear
                        </button>
                    </div>
                </div>
            </div>
        </section>
        <!-- Section: Integrantes -->
        <section>
            <div class="flex items-center gap-2 mb-4">
                <span class="text-2xl">🔄</span>
                <h2 class="font-h2 text-h2 text-on-surface">Integrantes</h2>
            </div>
            <div
                class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow border border-outline-variant/30">
                <div class="flex gap-4 mb-6">
                    <div class="flex-grow">
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md"
                            placeholder="Nombre del integrante" type="text" />
                    </div>
                    <button
                        class="bg-surface-container-low text-primary px-6 py-3 rounded-lg font-label-md text-label-md hover:bg-primary-container hover:text-on-primary-container transition-colors">
                        Agregar
                    </button>
                </div>
                <div class="space-y-3">
                    <div
                        class="flex justify-between items-center bg-surface p-4 rounded-lg border border-outline-variant/20 group hover:border-primary/50 transition-colors">
                        <span class="font-body-md text-body-md text-on-surface flex items-center gap-3">
                            <span
                                class="w-8 h-8 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center text-label-sm">A</span>
                            Ana
                        </span>
                        <button class="text-outline hover:text-error transition-colors">
                            <span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
                        </button>
                    </div>
                    <div
                        class="flex justify-between items-center bg-surface p-4 rounded-lg border border-outline-variant/20 group hover:border-primary/50 transition-colors">
                        <span class="font-body-md text-body-md text-on-surface flex items-center gap-3">
                            <span
                                class="w-8 h-8 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center text-label-sm">L</span>
                            Luis
                        </span>
                        <button class="text-outline hover:text-error transition-colors">
                            <span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
                        </button>
                    </div>
                    <div
                        class="flex justify-between items-center bg-surface p-4 rounded-lg border border-outline-variant/20 group hover:border-primary/50 transition-colors">
                        <span class="font-body-md text-body-md text-on-surface flex items-center gap-3">
                            <span
                                class="w-8 h-8 rounded-full bg-tertiary-fixed text-on-tertiary-fixed flex items-center justify-center text-label-sm">C</span>
                            Carla
                        </span>
                        <button class="text-outline hover:text-error transition-colors">
                            <span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>
        <!-- Section: Registrar Gasto -->
        <section>
            <div class="flex items-center gap-2 mb-4">
                <span class="text-2xl">💸</span>
                <h2 class="font-h2 text-h2 text-on-surface">Registrar Gasto</h2>
            </div>
            <div
                class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow border border-outline-variant/30">
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block font-label-md text-label-md text-outline mb-2">Descripción</label>
                            <input
                                class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md"
                                placeholder="Ej. Cena en el puerto" type="text" />
                        </div>
                        <div>
                            <label class="block font-label-md text-label-md text-outline mb-2">Monto</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline">$</span>
                                <input
                                    class="w-full bg-surface border border-outline-variant rounded-lg pl-8 pr-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md"
                                    placeholder="0.00" type="number" />
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block font-label-md text-label-md text-outline mb-2">¿Quién pagó?</label>
                        <select
                            class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md appearance-none">
                            <option>Seleccionar pagador</option>
                            <option>Ana</option>
                            <option>Luis</option>
                            <option>Carla</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-label-md text-label-md text-outline mb-3">¿Entre quiénes se
                            divide?</label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <label
                                class="flex items-center gap-3 p-3 bg-surface border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
                                <input checked="" class="w-5 h-5 rounded text-primary focus:ring-primary"
                                    type="checkbox" />
                                <span class="font-body-sm text-body-sm text-on-surface">Ana</span>
                            </label>
                            <label
                                class="flex items-center gap-3 p-3 bg-surface border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
                                <input checked="" class="w-5 h-5 rounded text-primary focus:ring-primary"
                                    type="checkbox" />
                                <span class="font-body-sm text-body-sm text-on-surface">Luis</span>
                            </label>
                            <label
                                class="flex items-center gap-3 p-3 bg-surface border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
                                <input checked="" class="w-5 h-5 rounded text-primary focus:ring-primary"
                                    type="checkbox" />
                                <span class="font-body-sm text-body-sm text-on-surface">Carla</span>
                            </label>
                        </div>
                    </div>
                    <button
                        class="w-full bg-primary text-on-primary py-4 rounded-lg font-h3 text-h3 hover:opacity-95 active:scale-[0.99] transition-all flex items-center justify-center gap-2"
                        type="submit">
                        Registrar Gasto
                    </button>
                </form>
            </div>
        </section>
        <!-- Illustration / Mood area -->
        <section class="flex flex-col items-center">
            <img alt="Gestión de gastos"
                class="w-full h-64 object-cover rounded-2xl grayscale opacity-40 mix-blend-multiply"
                data-alt="A minimalist and high-end close-up photograph of a professional workspace with a clean ledger and modern financial tools. The lighting is soft and natural, emphasizing a calm and organized atmosphere. The color palette is restricted to pristine whites, cool grays, and subtle teal accents. The mood is corporate, serene, and focused on clarity and precision."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAeDsMK51pMxhahGpvuriwCF6L_n8CnUXaNt_NczclxjOGtjt4kPvFFoqRWx3zZjlYNDKIWFSzSelQWqK2PYIYaQ3bDV25cK5ZQ8ZIrjRan3G6MC4pNLoKXbYirGNfSovvDzwPFlIPI0mH-vyjD5L455DbosYmIOWkoblDivRi-LlZ-T8_L7BLMQwnIpBmh-1V-Wem7fUetGpIPOKOZDAayvV4aqkx8XO4WTPceoeWzrndl8ptNn6bBa7Sk4ot3N4vZYJYYcq5NJUk" />
        </section>
    </main>
    <!-- Footer -->
    <footer class="bg-surface-container-low border-t border-outline-variant/20 py-section-gap mt-section-gap">
        <div
            class="flex flex-col md:flex-row justify-between items-center w-full px-gutter max-w-container-max-width mx-auto gap-4">
            <div class="font-label-md text-label-md font-bold text-on-background">💸 Agenda de Gastos</div>
            <div class="font-label-sm text-label-sm text-outline">© 2024 Agenda de Gastos Compartidos</div>
            <div class="flex gap-6">
                <a class="text-outline hover:text-primary transition-colors underline-offset-4 hover:underline font-label-sm text-label-sm"
                    href="#">Privacidad</a>
                <a class="text-outline hover:text-primary transition-colors underline-offset-4 hover:underline font-label-sm text-label-sm"
                    href="#">Términos</a>
                <a class="text-outline hover:text-primary transition-colors underline-offset-4 hover:underline font-label-sm text-label-sm"
                    href="#">Soporte</a>
            </div>
        </div>
    </footer>
</body>

</html>
