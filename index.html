<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda de Gastos — Ingresar datos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/pages/styles.config.css" />
  <link rel="stylesheet" href="assets/css/components/header.css" />
  <link rel="stylesheet" href="assets/css/pages/index.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <div class="header__brand">
        <span class="header__title">💸 Agenda de Gastos</span>
        <span class="header__group-name" id="nombre-grupo-header">Sin grupo activo</span>
      </div>
      <nav class="header__nav">
        <a href="index.html" class="header__nav-link active">Ingresar</a>
        <a href="pages/dashboard.html" class="header__nav-link">Dashboard</a>
      </nav>
      <a href="pages/dashboard.html" class="btn-nuevo-grupo">Ver Dashboard →</a>
    </div>
  </header>

  <main class="container page-main">
    <section class="section-gap">
      <div class="section-header">
        <span class="section-header__icon">📋</span>
        <h2 class="section-header__title">Nuevo Grupo</h2>
      </div>
      <div class="card">
        <div class="nuevo-grupo__row">
          <div class="form-group">
            <label class="form-label" for="input-nombre-grupo">Nombre del Grupo</label>
            <input id="input-nombre-grupo" class="form-input" type="text" placeholder='Ej. "Viaje a Máncora"' maxlength="50" />
          </div>
          <button id="btn-crear-grupo" class="btn btn--primary" style="align-self: flex-end;">Crear</button>
        </div>
      </div>
    </section>

    <section class="section-gap">
      <div class="section-header">
        <span class="section-header__icon">👥</span>
        <h2 class="section-header__title">Integrantes</h2>
      </div>
      <div class="card">
        <div class="integrantes__add-row">
          <div class="form-group">
            <label class="form-label" for="input-integrante">Nombre del integrante</label>
            <input id="input-integrante" class="form-input" type="text" placeholder="Ej. Ana" maxlength="30" />
          </div>
          <button id="btn-agregar-persona" class="btn btn--ghost" style="align-self: flex-end;">+ Agregar</button>
        </div>
        <div id="lista-integrantes"></div>
      </div>
    </section>

    <section class="section-gap">
      <div class="section-header">
        <span class="section-header__icon">💸</span>
        <h2 class="section-header__title">Registrar Gasto</h2>
      </div>
      <div class="card">
        <form id="form-gasto" class="gasto-form" novalidate>
          <div class="gasto-form__grid">
            <div class="form-group">
              <label class="form-label" for="input-desc">Descripción</label>
              <input id="input-desc" class="form-input" type="text" placeholder='Ej. "Cena en el puerto"' maxlength="60" />
            </div>
            <div class="form-group">
              <label class="form-label" for="input-monto">Monto (S/)</label>
              <div class="input-prefix">
                <span class="input-prefix__symbol">S/</span>
                <input id="input-monto" class="form-input form-input--amount" type="number" min="0.01" step="0.01" placeholder="0.00" />
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="select-pagador">¿Quién pagó?</label>
            <select id="select-pagador" class="form-select">
              <option value="">Seleccionar pagador</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">¿Entre quiénes se divide?</label>
            <div id="checkboxes-divide" class="checkboxes-grid"></div>
          </div>
          <button type="submit" class="btn btn--primary btn--full">✓ Registrar Gasto</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div>
        <div class="footer__brand">💸 Agenda de Gastos</div>
        <div class="footer__copy">© 2024 Agenda de Gastos Compartidos</div>
      </div>
      <nav class="footer__links">
        <a href="#">Privacidad</a>
        <a href="#">Términos</a>
        <a href="#">Soporte</a>
      </nav>
    </div>
  </footer>
  <script src="js/panel.js"></script>
</body>
</html>
